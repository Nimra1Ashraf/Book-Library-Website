<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">📚 EliteLibrary</div>

    <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search books..." />
        <button id="cartBtn" class="cart-btn">
            🛒 <span id="cartCount">0</span>
        </button>
    </div>
</header>

<main class="container">

    <section class="categories" id="categories"></section>

    <section class="books-grid" id="booksGrid"></section>

</main>

<aside class="cart-sidebar" id="cartSidebar">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-footer">
        <h3>Total: $<span id="cartTotal">0</span></h3>
        <button id="checkoutBtn" class="checkout-btn">Checkout</button>
    </div>
</aside>

<script src="script.js"></script>

</body>
</html>
